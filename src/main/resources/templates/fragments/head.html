<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Shared <head> fragment. Pages include with:
    <head th:replace="~{fragments/head :: head('Page Title')}"></head>
-->
<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${title}">WeaveYourTrip</title>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
  <!-- Leaflet 1.9 — maps on the itinerary view, no API key needed -->
  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <!-- HTMX 2.x for wizard transitions + SSE streaming -->
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <!-- Persist dark/light theme across navigations -->
  <script>(function(){var t=localStorage.getItem('weaveyourtrip-theme')||'dark';document.documentElement.dataset.theme=t;}());</script>
</head>
</html>
