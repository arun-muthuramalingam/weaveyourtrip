<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Step 1 — Pick your passport · WeaveYourTrip')}"></head>

<body>

<div th:replace="~{fragments/wizard-nav :: nav(1)}"></div>

<main class="wizard-body">

  <div class="step">
    <div class="step-header">
      <div class="label">Step 1 of 6</div>
      <h2>What's your passport?</h2>
      <p class="text-sm text-muted" style="margin-top:8px;">
        We ask this first because everything downstream — visa requirements,
        document checklist, even the recommended travel insurance — depends on it.
      </p>
    </div>

    <form th:action="@{/plan/passport}" method="post">
      <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr));
                  gap:14px; margin-top:24px;">
        <button th:each="p : ${passports}"
                type="submit"
                name="passport"
                th:value="${p.name()}"
                th:disabled="${p.name() != 'IN'}"
                th:classappend="${p.name() == 'IN' ? '' : 'disabled'}"
                style="background:var(--white); border:2px solid var(--border);
                       border-radius:12px; padding:22px 18px; cursor:pointer;
                       transition:all 0.18s; display:flex; flex-direction:column;
                       align-items:flex-start; gap:8px; text-align:left;">
          <span style="font-size:32px; line-height:1;" th:text="${p.flag}">🇮🇳</span>
          <span style="font-size:15px; font-weight:600;" th:text="${p.displayName}">India</span>
          <span th:if="${p.name() == 'IN'}"
                style="font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
                       color:var(--sage); font-weight:600;">✓ Visa-aware</span>
          <span th:if="${p.name() != 'IN'}"
                style="font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
                       color:var(--muted); font-weight:600;">Coming soon</span>
        </button>
      </div>
    </form>

    <div class="step-footer">
      <a th:href="@{/}" class="btn btn-ghost">← Back</a>
    </div>
  </div>

</main>

<script>
  function toggleTheme() {
    var next = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
    document.documentElement.dataset.theme = next;
    localStorage.setItem('weaveyourtrip-theme', next);
    document.getElementById('theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
  }
  document.getElementById('theme-toggle').textContent =
    document.documentElement.dataset.theme === 'dark' ? '☀️' : '🌙';
</script>

</body>
</html>
